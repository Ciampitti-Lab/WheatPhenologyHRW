# =================================================================
# WheatPhenologyHRW — Centralized Configuration
# =================================================================
# Single source of truth for ALL paths, parameters, and study settings.
# Notebooks load this via `scripts/utils/config.py` → `cfg = get_config()`.
# =================================================================

# ----- Paths -----
paths:
  # ─── Data root (depot mount) ─────────────────────────────────────
  data_root:        data
  results_root:     data/results
  poster_root:      poster_figures

  # ─── Raw inputs ──────────────────────────────────────────────────
  phenology_raw:    data/raw/phenology/wheat_hrw_phenology.parquet
  satellite_raw:    data/raw/satellite

  # ─── Processed: spatial reference ────────────────────────────────
  buf_polygons_geojson: data/processed/buffer_300m/wheat_fields_buffer300m_polygons.geojson
  buf_polygons_zip:     data/processed/buffer_300m/wheat_fields_buffer300m_polygons.zip
  csb_polygons_geojson: data/processed/exact/wheat_fields_csb_polygons.geojson

  # ─── Processed: phenology + HLS time series ──────────────────────
  phenology_matched:    data/processed/buffer_300m/wheat_hrw_phenology_buffer_matched.parquet
  hls_merged:           data/processed/buffer/hls_phenology_merged.parquet

  # ─── Processed: weather (Daymet) ─────────────────────────────────
  daymet_full:          data/raw/satellite/daymet_daily_weather_full.csv

  # ─── Raw GEE extracts (per-source) ───────────────────────────────
  # Slim 3-source stack (ablation-validated; see data/results/per_source_ablation_summary.csv):
  #   1. HLS (Landsat 8 + Sentinel-2)  — canopy signal (NDVI/EVI/GCVI phenometrics)
  #   2. Daymet V4                     — daily T/precip/srad/VP → WES simulator + stress windows
  #   3. MODIS LST                     — surface temperature → drought stress signal
  # SoilGrids, SMAP, MOD16 ET were ablation-removed (mean ΔR² ≈ 0).
  # GridMET / ERA5-Land / CHIRPS were ablation-removed earlier (redundant with Daymet).
  modis_lst:            data/raw/satellite/modis_lst_buffer.csv

  # ─── Features (built sequentially by 02_features/01-07) ──────────
  # The pipeline transforms inputs through named stages; only the final
  # `features.parquet` is consumed by 03_modeling.
  features_dir:         data/processed/features
  features:             data/processed/features/features.parquet                          # final — used by ML

  # ─── Results ─────────────────────────────────────────────────────
  multi_stage_ml:       data/results/multi_stage_ml.csv
  multi_stage_models:   data/results/multi_stage_models.csv
  pcse_wofost:          data/results/pcse_wofost_phenology.csv
  strategy_d_pcse:      data/results/strategy_D_pcse_wofost.csv

  # ─── Local resources ─────────────────────────────────────────────
  states_shp:           data/external/ne_50m_admin_1_states_provinces.shp
  pdfs_dir:             pdfs


# ----- GEE asset (for extraction scripts) -----
gee:
  asset:        projects/propane-primacy-481403-u3/assets/wheat_fields_buffer300m_polygons
  drive_folder: WheatPhenologyHRW_HLS


# ----- Study Area -----
study_area:
  states:       [Texas, Oklahoma, Kansas, Nebraska, Colorado]
  state_codes:  [TX, OK, KS, NE, CO]
  years:        [2013, 2014, 2015, 2016, 2017]
  crop:         winter_wheat
  variety:      Hard Red Winter Wheat
  n_fields:     6120


# ----- Phenology stage targets -----
# Used by 03_modeling/01_multi_stage_ml.ipynb to build per-stage DOS targets.
phenology_stages:
  emergence:   [Emerging, Emerging - Seedling, Shoot - Emerging, Shoot,
                Seedling, Seedling - 1 Leaf, 1 Leaf, 2 Leaf, 3 Leaf, 4 Leaf]
  tillering:   [Begin Tillering, Tillering, 1-2 Tiller, 2-4 Tiller, 4-6 Tiller,
                6-8 Tiller, 8+ Tiller, Full Tillering, End Tillering]
  jointing:    [Jointing, 1st Node Visible, 2nd Node Visible, 3rd Node Visible,
                Spring Vegetative]
  flag_leaf:   [Flag Leaf Emerging, Flag Leaf Emerged]
  boot:        [Early Boot, Boot]
  heading:     [Head Emerging, Heading, Complete Heading]
  anthesis:    [Early Bloom, Bloom]
  # NOTE: maturity uses STRICT labels only. Pooled labels gave R²~0; restricting to
  # physiological maturity recovers R²=0.57 (paper finding).
  maturity:    [Maturity, Harvest Ready, Ready For Harvesting]

# Stages observed in spring (post-dormancy resumption). Apply DOS > 200 filter to avoid
# capturing fall observations as targets — WES predicts the spring resumption.
spring_only_stages: [tillering, jointing]
spring_dos_min:     200

# Stages where windowed (gf/pa) features are causally invalid (target observed before window ends)
early_stages_no_window: [emergence, tillering, jointing]


# ----- Grain-filling & pre-anthesis windows (per harvest year) -----
# These define the GEE extraction windows for Tier-4 features.
windows:
  grain_filling:
    start_month_day:  [4, 15]   # Apr 15
    end_month_day:    [6, 30]   # Jun 30
    suffix:           _gf
  pre_anthesis:
    start_month_day:  [3, 1]    # Mar 1
    end_month_day:    [4, 15]   # Apr 14
    suffix:           _pa


# ----- ML configuration -----
ml:
  cv_strategy:      LOYO
  cv_inner_folds:   5
  bootstrap_iters:  300
  k_grid:           [20, 40, 60, 80, null]   # null = use all features
  models:           [ElasticNet, Ridge, RandomForest, XGBoost, LightGBM]
  strategies:
    A: WES direct prediction (physics, no ML)
    B: ML only (no WES outputs in features)
    C: Hybrid (WES outputs + all features + ML)
    D: PCSE-WOFOST direct prediction (independent process model)


# ----- PCSE-WOFOST settings -----
pcse:
  variety:           Winter_wheat_106
  default_sow_date:  [10, 15]                # Oct 15 of harvest_year - 1
  end_date:          [7, 15]                 # Jul 15 of harvest_year
  WAV:               10                      # initial soil water (cm)
  wind_speed:        3.0                     # m/s (Daymet has no wind)
  elevation_default: 400                     # m
  workers:           4
  excluded_years:    [2013]                  # Daymet starts 2013-01-01


# ----- Key citations -----
references:
  bandaru_2020:           Bandaru et al. 2020 — PhenoCrop framework
  wang_engel_1998:        Wang & Engel 1998 — three-phase phenology model
  streck_2003:            Streck et al. 2003 — vernalization function
  porter_gawith_1999:     Porter & Gawith 1999 — wheat cardinal temperatures
  mcmaster_wilhelm_1997:  McMaster & Wilhelm 1997 — GDD method 2
